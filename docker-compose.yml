services:
  # ============================================
  # Next.js Application
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_TYPEBOT_BOT_ID=easylegal-assistant
    container_name: easylegal-app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - HOSTNAME=0.0.0.0
      - MINIO_ENDPOINT=http://host.docker.internal:9000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - uploads:/app/public/uploads
    networks:
      - easylegal
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================
  # Nginx Reverse Proxy
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: easylegal-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - uploads:/app/public/uploads:ro
    depends_on:
      - app
    networks:
      - easylegal

  # ============================================
  # Typebot Chatbot Builder & Viewer
  # ============================================
  typebot-builder:
    image: baptistearno/typebot-builder:latest
    container_name: easylegal-typebot-builder
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.production
    environment:
      - DATABASE_URL=postgresql://easylegal:jauhimaksiat%401@172.17.0.1:5432/typebot
      - NEXTAUTH_URL=https://typebot.easylegal.my.id
      - NEXT_PUBLIC_APP_URL=https://typebot.easylegal.my.id
      - NEXT_PUBLIC_VIEWER_URL=https://typebot.easylegal.my.id
      - ENCRYPTION_SECRET=${TYPEBOT_ENCRYPTION_SECRET}
      - ADMIN_EMAIL=admin@easylegal.my.id
      # - DISABLE_SIGNUP=true  # Aktifkan setelah admin pertama dibuat
      - SMTP_HOST=smtp.hostinger.com
      - SMTP_PORT=465
      - SMTP_USERNAME=${TYPEBOT_SMTP_USERNAME}
      - SMTP_PASSWORD=${TYPEBOT_SMTP_PASSWORD}
      - SMTP_SECURE=true
      - NEXT_PUBLIC_SMTP_FROM=Easy Legal <newsletter@easylegal.id>
      - NEXT_PUBLIC_UPLOAD_TYPE=local
    networks:
      - easylegal
    depends_on:
      - app
    volumes:
      - typebot-data:/app/apps/builder/public

  typebot-viewer:
    image: baptistearno/typebot-viewer:latest
    container_name: easylegal-typebot-viewer
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.production
    environment:
      - DATABASE_URL=postgresql://easylegal:jauhimaksiat%401@172.17.0.1:5432/typebot
      - NEXTAUTH_URL=https://typebot.easylegal.my.id
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-Ub1Ir6felK890zb8uj7Le93nxZvyXL1JGa7S0jo05sB}
      - NEXT_PUBLIC_APP_URL=https://typebot.easylegal.my.id
      - NEXT_PUBLIC_VIEWER_URL=https://typebot.easylegal.my.id
      - ENCRYPTION_SECRET=${TYPEBOT_ENCRYPTION_SECRET}
    networks:
      - easylegal
    depends_on:
      - app

volumes:
  uploads:
  typebot-data:

networks:
  easylegal:
    driver: bridge
