services:
  # ============================================
  # Next.js Application
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: easylegal-app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - HOSTNAME=0.0.0.0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - uploads:/app/public/uploads
    networks:
      - easylegal
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  uploads:

networks:
  easylegal:
    driver: bridge
