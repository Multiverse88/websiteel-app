worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Upstreams
    upstream app {
        server app:3000;
    }

    upstream recruit-app {
        server 172.17.0.1:3000;
    }

    # Cloudflare Real IP — supaya $remote_addr = IP asli client
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # ==========================================
    # 1. WEBSITE UTAMA: easylegal.my.id
    # ==========================================

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name easylegal.my.id www.easylegal.my.id;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl;
        http2 on;
        server_name easylegal.my.id www.easylegal.my.id;

        ssl_certificate     /etc/letsencrypt/live/easylegal.my.id/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/easylegal.my.id/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location /_next/static/ {
            proxy_pass http://app;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location /static/ {
            proxy_pass http://app;
            proxy_cache_valid 200 30d;
            add_header Cache-Control "public, max-age=2592000";
        }

        # Serve static images from MinIO (bucket: images, key: images/...)
        location /images/ {
            proxy_pass http://172.17.0.1:9000/images/;
            proxy_http_version 1.1;
            proxy_set_header Host cdn.easylegal.my.id;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_valid 200 30d;
            add_header Cache-Control "public, max-age=2592000";
            add_header Access-Control-Allow-Origin "*" always;
        }

        # User uploads — fallback for non-CDN mode
        location /uploads/ {
            alias /app/public/uploads/;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
        }

        location = /favicon.ico {
            proxy_pass http://app;
            proxy_cache_valid 200 7d;
            add_header Cache-Control "public, max-age=604800";
        }

        location / {
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ==========================================
    # 2. WEBSITE REKRUTMEN: easyai.id
    # ==========================================

    # HTTP Server & Let's Encrypt challenge handler
    server {
        listen 80;
        server_name easyai.id www.easyai.id dashboard.easyai.id disc.easyai.id;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server untuk easyai.id
    server {
        listen 443 ssl;
        http2 on;
        server_name easyai.id www.easyai.id dashboard.easyai.id disc.easyai.id;

        ssl_certificate     /etc/letsencrypt/live/easyai.id/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/easyai.id/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location /_next/static/ {
            proxy_pass http://recruit-app;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location /static/ {
            proxy_pass http://recruit-app;
            proxy_cache_valid 200 30d;
            add_header Cache-Control "public, max-age=2592000";
        }

        location / {
            proxy_pass http://recruit-app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

# ==========================================
    # 3. CDN: cdn.easylegal.my.id → MinIO Storage
    # ==========================================
    server {
        listen 80;
        server_name cdn.easylegal.my.id;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name cdn.easylegal.my.id;

        ssl_certificate     /etc/letsencrypt/live/cdn.easylegal.my.id/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cdn.easylegal.my.id/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Proxy ke MinIO (port 9000 di host, via docker gateway)
        location / {
            proxy_pass http://172.17.0.1:9000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_buffering off;
            proxy_request_buffering off;
        }
    }

    # ==========================================
    # 4. TYPEBOT: typebot.easylegal.my.id
    # ==========================================
    server {
        listen 80;
        server_name typebot.easylegal.my.id;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Typebot — ROUTING MIXED (Builder untuk admin, Viewer untuk bot)
    server {
        listen 443 ssl;
        http2 on;
        server_name typebot.easylegal.my.id;

        ssl_certificate     /etc/letsencrypt/live/typebot.easylegal.my.id/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/typebot.easylegal.my.id/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        add_header Access-Control-Allow-Origin "https://easylegal.my.id" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # ── Route ke Builder (Admin) — Tailscale only ──
        location /_next/ {
            allow 100.64.0.0/10;
            allow 182.253.178.248;
            deny all;
            proxy_pass http://typebot-builder:3000;
        }
        location /images/backgrounds/ {
            allow 100.64.0.0/10;
            allow 182.253.178.248;
            deny all;
            proxy_pass http://typebot-builder:3000;
        }
        location /api/orpc/ {
            allow 100.64.0.0/10;
            allow 182.253.178.248;
            deny all;
            proxy_pass http://typebot-builder:3000;
        }
        location /api/auth/ {
            allow 100.64.0.0/10;
            allow 182.253.178.248;
            deny all;
            proxy_pass http://typebot-builder:3000;
        }
        location /typebots {
            allow 100.64.0.0/10;
            allow 182.253.178.248;
            deny all;
            proxy_pass http://typebot-builder:3000;
        }
        location /signin {
            allow 100.64.0.0/10;
            allow 182.253.178.248;
            deny all;
            proxy_pass http://typebot-builder:3000;
        }
        location /register {
            allow 100.64.0.0/10;
            allow 182.253.178.248;
            deny all;
            proxy_pass http://typebot-builder:3000;
        }
        location /feedback {
            allow 100.64.0.0/10;
            allow 182.253.178.248;
            deny all;
            proxy_pass http://typebot-builder:3000;
        }
        location /api/uploads/ {
            allow 100.64.0.0/10;
            allow 182.253.178.248;
            deny all;
            proxy_pass http://typebot-builder:3000;
        }
        location /api/v1/credentials/ {
            allow 100.64.0.0/10;
            allow 182.253.178.248;
            deny all;
            proxy_pass http://typebot-builder:3000;
        }

        # ── Route ke Viewer (Bot Pages & API) ──
        # Builder preview API (must be before viewer v1/v2 catch)
        location ~ ^/api/v[12]/typebots/[^/]+/preview/ {
            allow 100.64.0.0/10;
            allow 182.253.178.248;
            deny all;
            proxy_pass http://typebot-builder:3000;
            proxy_http_version 1.1;
            proxy_set_header Host typebot.easylegal.my.id;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host typebot.easylegal.my.id;
        }
        # API Viewer
        location ~ ^/api/v[12]/ {
            proxy_pass http://typebot-viewer:3000;
            proxy_http_version 1.1;
            proxy_set_header Host typebot.easylegal.my.id;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host typebot.easylegal.my.id;
        }
        location /typebot-embed/ {
            proxy_pass http://typebot-viewer:3000;
            proxy_http_version 1.1;
            proxy_set_header Host typebot.easylegal.my.id;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host typebot.easylegal.my.id;
        }

        # Catch-all untuk bot pages (/{publicId})
        location / {
            proxy_pass http://typebot-viewer:3000;
            proxy_http_version 1.1;
            proxy_set_header Host typebot.easylegal.my.id;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host typebot.easylegal.my.id;
            add_header Content-Security-Policy "frame-ancestors https://easylegal.my.id" always;
        }
    }
}
